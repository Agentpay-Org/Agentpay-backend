name: Feature request
description: Suggest an improvement for AgentPay Backend.
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please keep examples free of API keys, private keys, seed phrases, and other secrets.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem should this solve?
      placeholder: Describe the workflow, endpoint, or integration gap.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention any simpler or rejected approaches.
  - type: textarea
    id: api
    attributes:
      label: API or data model impact
      description: List affected endpoints, request fields, response fields, or storage changes.
      placeholder: No API impact / affects ...
  - type: textarea
    id: tests
    attributes:
      label: Test plan
      description: What tests or checks should validate the feature?
      placeholder: Unit tests, endpoint tests, npm run lint, npm run build, npm test
